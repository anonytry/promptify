allow-external-apps = true
shortcut.create-session = ctrl + t
shortcut.next-session = ctrl + 5
shortcut.previous-session = ctrl + 4

# Advanced 8-Key Grid with Popups (User Preferred Layout)
extra-keys = [ \
  [ \
    {key: 'ESC', popup: 'CTRL c'}, \
    {key: '|', popup: '&'}, \
    {key: '/', popup: '\\\\'}, \
    {key: 'HOME', popup: '`'}, \
    {key: 'UP', popup: 'PGUP'}, \
    {key: 'END', popup: '~'}, \
    {key: 'PGUP', popup: 'ESC'}, \
    {key: 'DEL', popup: 'BKSP'} \
  ], \
  [ \
    {key: 'TAB', popup: {macro: "CTRL d", display: 'EXIT'}}, \
    {key: 'CTRL', popup: 'ALT'}, \
    {key: 'ALT', popup: 'CTRL'}, \
    {key: 'LEFT', popup: 'HOME'}, \
    {key: 'DOWN', popup: 'PGDN'}, \
    {key: 'RIGHT', popup: 'END'}, \
    {key: 'PGDN', popup: 'ENTER'}, \
    {key: 'BKSP', popup: {macro: "CTRL l", display: 'CLR'}} \
  ] \
]
